<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文字冒险</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@200;300&display=swap" rel="stylesheet">
<style>
:root{
  /* 暖墨黑配色（oklch，低饱和、不扎眼）*/
  --bg:        oklch(0.155 0.012 55);
  --bg-soft:   oklch(0.185 0.013 55);
  --panel:     oklch(0.205 0.014 55);
  --line:      oklch(0.32  0.012 55);
  --line-soft: oklch(0.26  0.011 55);
  --fg:        oklch(0.92  0.012 80);
  --fg-dim:    oklch(0.66  0.012 75);
  --fg-mute:   oklch(0.48  0.011 70);
  /* 语义色（克制使用）*/
  --amber:  oklch(0.82 0.135 75);
  --cyan:   oklch(0.80 0.085 215);
  --green:  oklch(0.78 0.13 152);
  --red:    oklch(0.72 0.17 28);
  --violet: oklch(0.74 0.12 295);

  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --sans: 'Noto Sans SC', system-ui, sans-serif;
  --serif:'Noto Serif SC', serif;

  --ease-in:  cubic-bezier(.2,.7,.2,1);
  --ease-out: cubic-bezier(.6,.2,.7,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--fg);
  font-family:var(--sans); font-size:15.5px; line-height:1.78;
  display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden;
}
/* 整个 app 封顶居中：超宽屏不铺满，坐在有边界的阅读框里 */
#topbar,#statusbar,#stage-wrap,#inputbar{ width:100%; max-width:1180px; }
.mono{font-family:var(--mono)}
.label{font-family:var(--mono); font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--fg-mute)}

/* ── 顶栏（极弱）── */
#topbar{
  flex:0 0 auto; display:flex; align-items:center; gap:14px;
  padding:6px 14px; border-bottom:1px solid var(--line-soft);
  font-family:var(--mono); font-size:11.5px; color:var(--fg-mute);
}
#topbar .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber)}
#topbar .sp{flex:1}

/* ── 状态条 + Tab ── */
#statusbar{
  flex:0 0 auto; display:flex; align-items:stretch; gap:0;
  border-bottom:1px solid var(--line-soft); background:var(--bg-soft);
}
#stats{display:flex; gap:0; flex:1; min-width:0; overflow:hidden}
.stat{
  display:flex; flex-direction:column; gap:3px; justify-content:center;
  padding:8px 16px; border-right:1px solid var(--line-soft);
  cursor:default; transition:background .2s var(--ease-in); position:relative;
}
.stat:hover{background:var(--panel)}
.stat .k{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-mute)}
.stat .v{font-family:var(--mono);font-size:13px;color:var(--fg-dim)}
.stat .bar{height:2px;width:54px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:1px}
.stat .bar i{display:block;height:100%;background:var(--fg-mute);transition:width .35s var(--ease-in),background .2s}
.stat:hover .bar i{background:var(--accent,var(--amber))}
.stat[data-sem=hp]{--accent:var(--red)} .stat[data-sem=sp]{--accent:var(--cyan)}
.stat[data-sem=str]{--accent:var(--red)} .stat[data-sem=dex]{--accent:var(--cyan)}
.stat[data-sem=con]{--accent:var(--green)} .stat[data-sem=int]{--accent:var(--violet)}
#tabs{display:flex}
.tab{
  display:flex;align-items:center;gap:6px;padding:8px 14px;cursor:pointer;
  border-left:1px solid var(--line-soft); color:var(--fg-mute);
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;
  transition:color .2s,background .2s;
}
.tab:hover{color:var(--fg-dim);background:var(--panel)}
.tab.active{color:var(--amber);background:var(--panel)}
.tab .badge{font-size:9px;border:1px solid var(--line);border-radius:3px;padding:0 4px;color:var(--fg-mute)}

/* ── 右侧抽屉：背包/技能/任务/地图（只读看板）── */
#drawer-scrim{position:fixed;inset:0;background:oklch(0.1 0.01 55 / .5);
  opacity:0;pointer-events:none;transition:opacity .25s var(--ease-in);z-index:40}
#drawer-scrim.open{opacity:1;pointer-events:auto}
#drawer{position:fixed;top:0;right:0;height:100%;width:360px;max-width:90vw;z-index:41;
  background:var(--bg-soft);border-left:1px solid var(--line);
  transform:translateX(100%);transition:transform .28s var(--ease-in);
  display:flex;flex-direction:column;box-shadow:-20px 0 50px oklch(0.1 0.01 55 / .4)}
#drawer.open{transform:translateX(0)}
#drawer .dhead{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line-soft)}
#drawer .dhead .dtitle{font-family:var(--serif);font-size:18px;color:var(--fg)}
#drawer .dhead .sp{flex:1}
#drawer .dhead .dclose{cursor:pointer;color:var(--fg-mute);font-family:var(--mono);font-size:12px;
  border:1px solid var(--line);border-radius:4px;padding:2px 8px}
#drawer .dhead .dclose:hover{color:var(--fg);border-color:var(--fg-mute)}
#dbody{flex:1;overflow:auto;padding:14px 16px;scrollbar-width:thin}
/* 内切小标签（抽屉内切换 背包/技能/任务/地图）*/
#dswitch{display:flex;gap:4px;padding:8px 16px 0}
#dswitch .ds{flex:1;text-align:center;cursor:pointer;font-family:var(--mono);font-size:11px;
  color:var(--fg-mute);padding:6px 0;border-bottom:2px solid transparent}
#dswitch .ds.active{color:var(--amber);border-bottom-color:var(--amber)}
#dswitch .ds:hover{color:var(--fg-dim)}
/* 列表项 */
.pitem{padding:10px 0;border-bottom:1px solid var(--line-soft)}
.pitem .pname{font-family:var(--sans);font-size:14px;color:var(--fg);display:flex;align-items:center;gap:8px}
.pitem .ptag{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid var(--line);color:var(--fg-mute)}
.pitem .pcap{font-family:var(--mono);font-size:11px;color:var(--fg-dim);margin-top:4px;line-height:1.5}
.pitem .pdesc{font-size:12px;color:var(--fg-dim);margin-top:4px;line-height:1.55}
.pempty{color:var(--fg-mute);font-family:var(--mono);font-size:12px;padding:20px 0;text-align:center}
.psection{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--fg-mute);
  text-transform:uppercase;margin:14px 0 4px}
.psection:first-child{margin-top:0}
.fact{font-size:12px;color:var(--fg-dim);padding:3px 0 3px 14px;position:relative;line-height:1.5}
.fact::before{content:'·';position:absolute;left:2px;color:var(--amber)}
.fact.un::before{content:'?';color:var(--cyan)}
/* 地图 */
#mapwrap{position:relative;margin:0 auto}
#mapwrap svg{position:absolute;inset:0;pointer-events:none}
.mroom{position:absolute;width:60px;height:44px;transform:translate(-50%,-50%);
  border:1px solid var(--line);border-radius:6px;background:var(--panel);
  display:flex;align-items:center;justify-content:center;text-align:center;
  font-family:var(--sans);font-size:10px;color:var(--fg-dim);padding:2px 3px;line-height:1.15;z-index:2}
.mroom.unvisited{opacity:.4;border-style:dashed}
.mroom.safe{border-color:var(--green)}
.mroom.current{border-color:var(--amber);color:var(--fg);box-shadow:0 0 0 1px var(--amber),0 0 14px oklch(0.82 0.135 75 / .35);z-index:3}
.mroom .you{position:absolute;top:-7px;right:-7px;font-size:10px;background:var(--amber);color:var(--bg);
  border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center}
.maplegend{font-family:var(--mono);font-size:10px;color:var(--fg-mute);text-align:center;margin-top:14px;line-height:1.8}

/* ── 房间二维棋盘（场地）── */
.bhint{font-family:var(--mono);font-size:10.5px;color:var(--fg-mute);text-align:center;margin-bottom:12px;line-height:1.7}
.board{display:grid;gap:4px;justify-content:center;margin:0 auto}
.bcell{border:1px solid var(--line-soft);border-radius:6px;background:var(--bg-soft);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  position:relative;overflow:hidden;text-align:center;color:var(--fg-mute)}
.bcell .bg{font-size:13px;line-height:1}
.bcell .bn{font-size:9px;line-height:1.05;max-width:100%;padding:0 2px;
  word-break:break-all;color:var(--fg-dim)}
.bcell.b-object{border-color:var(--amber);color:var(--amber)}
.bcell.b-object .bn{color:var(--fg)}
.bcell.b-landmark{border-style:dashed;border-color:var(--fg-mute)}
.bcell.b-exit{border-color:var(--cyan);color:var(--cyan)}
.bcell.b-exit .bn{color:var(--cyan)}
.bcell.b-ambient{color:var(--fg-mute)}
.bcell.b-poi{border-color:var(--violet);border-style:dashed;color:var(--violet)}
.bcell.b-poi .bg{font-weight:700}
.bcell.b-poi .bn{color:var(--violet);opacity:.85}
.bcell.b-enemy{color:var(--red)}
.bcell.b-enemy .bn{color:var(--red)}
.bcell.b-enemy-idle{border-color:var(--amber);color:var(--amber)}
.bcell.b-enemy-idle .bn{color:var(--amber);opacity:.85}
.bcell.b-enemy-hostile{border-color:var(--red);box-shadow:0 0 10px oklch(0.72 0.17 28 / .35)}
.bcell.blocked{background:repeating-linear-gradient(45deg,var(--line-soft) 0 3px,transparent 3px 7px)}
.bcell.here{box-shadow:0 0 0 2px var(--amber) inset,0 0 14px oklch(0.82 0.135 75 / .3);z-index:2}
.bcell .byou{position:absolute;top:2px;right:3px;font-size:9px;background:var(--amber);
  color:var(--bg);border-radius:3px;padding:0 3px;font-family:var(--mono)}
.blegend{font-family:var(--mono);font-size:10px;color:var(--fg-mute);text-align:center;margin-top:14px;line-height:1.9}

/* ── 会话菜单（顶栏右侧）── */
#topbar{position:relative}
#sessbtn{cursor:pointer;color:var(--fg-dim);padding:2px 9px;border:1px solid var(--line);
  border-radius:4px;margin-left:14px;transition:color .2s,border-color .2s}
#sessbtn:hover{color:var(--fg);border-color:var(--fg-mute)}
#sessmenu{position:absolute;top:40px;right:0;min-width:248px;background:var(--bg-soft);
  border:1px solid var(--line);border-radius:8px;padding:6px;z-index:45;display:none;
  box-shadow:0 14px 44px oklch(0.1 0.01 55 / .55)}
#sessmenu.open{display:block}
#sessmenu .mi{padding:8px 10px;border-radius:5px;cursor:pointer;font-family:var(--sans);
  font-size:13px;color:var(--fg-dim);display:flex;gap:8px;align-items:baseline}
#sessmenu .mi:hover{background:var(--panel);color:var(--fg)}
#sessmenu .mi .meta{font-family:var(--mono);font-size:10px;color:var(--fg-mute);margin-left:auto;white-space:nowrap}
#sessmenu .sep{height:1px;background:var(--line-soft);margin:6px 4px}
#sessmenu .mh{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--fg-mute);padding:4px 10px}
#sessmenu .mempty{color:var(--fg-mute);font-size:12px;padding:8px 10px;font-family:var(--mono)}

/* ── 主舞台 ── */
#stage-wrap{flex:1 1 auto; min-height:0; padding:14px 22px; overflow:hidden; display:flex; flex-direction:column}
#stage-head{
  font-family:var(--mono);font-size:11px;color:var(--fg-mute);letter-spacing:.12em;
  padding-bottom:8px; border-bottom:1px solid var(--line-soft); margin-bottom:10px;
  display:flex; gap:10px; align-items:center;
}
#stage-head .live{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
#stage{flex:1 1 auto; overflow-y:auto; padding-right:8px; scroll-behavior:smooth}
#stage::-webkit-scrollbar{width:8px} #stage::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

/* 消息样式 —— 全部居中成阅读列，空白均分两侧（不再左对齐挤在一边）*/
.msg{margin:0 auto 18px auto; max-width:72ch; width:100%; animation:fadein .35s var(--ease-in)}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.gm{color:var(--fg)}
.msg.gm em{font-style:normal;font-weight:600;color:var(--fg)}        /* 强调用字重不用色 */
.msg.gm strong{font-weight:600;color:var(--fg)}
.msg.gm code{font-family:var(--mono);font-size:12.5px;color:var(--fg-dim);background:var(--bg-soft);padding:1px 5px;border-radius:3px}
.msg.gm pre{font-family:var(--mono);font-size:12.5px;color:var(--fg-dim);background:var(--bg-soft);border:1px solid var(--line-soft);border-radius:6px;padding:10px 14px;margin:10px 0;line-height:1.6;white-space:pre-wrap;overflow-x:auto}
.msg.player{color:var(--fg-mute); padding-left:14px}
.msg.player::before{content:'› ';color:var(--fg-mute)}
.msg.system{font-family:var(--mono);font-size:12.5px;color:var(--fg-mute);display:flex;gap:8px;align-items:baseline}
.msg.system .pip{width:7px;height:7px;border-radius:50%;background:var(--fg-mute);flex:0 0 auto;margin-top:6px}
.msg.system.ok .pip{background:var(--green)} .msg.system.fail .pip{background:var(--red)} .msg.system.warn .pip{background:var(--amber)}
.thinking{color:var(--fg-mute);font-family:var(--mono);font-size:12px;font-style:italic;opacity:.8;max-width:72ch;width:100%;margin:0 auto 18px auto}
.cursor::after{content:'▌';color:var(--amber);animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* ── 引擎渲染面板（场景/明骰/战斗）：替代 GM 手抄状态块 ── */
.msg.card{max-width:72ch;width:100%;margin:0 auto 14px auto;background:var(--bg-soft);
  border:1px solid var(--line-soft);border-radius:8px;padding:9px 14px;font-family:var(--mono)}
.card .card-h{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-mute);margin-bottom:2px}
.card .card-b{font-size:12.5px;color:var(--fg-dim);margin-bottom:7px}
.card .card-b:last-child{margin-bottom:0}
.card.dice{border-left:2px solid var(--line)}
.card.dice .dice-line{font-size:13px;color:var(--fg)}
.card.dice.out-success,.card.dice.out-critical_success{border-left-color:var(--green)}
.card.dice.out-failure,.card.dice.out-critical_failure{border-left-color:var(--red)}
.card.combat{border-left:2px solid var(--amber)}
.card.combat .ttl{font-size:10px;letter-spacing:.16em;color:var(--fg-mute);margin-bottom:7px}
.card.combat .cb{display:flex;align-items:center;gap:9px;margin:4px 0;font-size:12px}
.card.combat .cb .nm{flex:0 0 8em;color:var(--fg-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.combat .cb .bar{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.card.combat .cb .bar i{display:block;height:100%;background:var(--green);transition:width .3s var(--ease-in)}
.card.combat .cb.enemy .bar i{background:var(--red)}
.card.combat .cb .hp{flex:0 0 auto;color:var(--fg-mute);font-size:11px}
.card.combat .cb.active .nm{color:var(--amber)}
.card.combat .cb.active .nm::before{content:'▶ '}
.card.combat .cb.dead{opacity:.4} .card.combat .cb.dead .nm{text-decoration:line-through}
.card.log{border-left:2px solid var(--cyan)}
.card.log .log-body{font-size:12px;color:var(--fg-dim);line-height:1.75}
/* GM 工具调用痕迹：弱、小、不抢叙事 */
.msg.trace{font-family:var(--mono);font-size:11px;max-width:72ch;width:100%;margin:1px auto;opacity:.62}
.msg.trace .tn{color:var(--fg-dim)} .msg.trace .ta{color:var(--fg-mute)}

/* ── 输入栏 ── */
#inputbar{
  flex:0 0 auto; display:flex; align-items:center; gap:10px;
  padding:10px 18px; border-top:1px solid var(--line-soft); background:var(--bg-soft);
}
.modes{display:flex;gap:6px}
.mode{
  font-family:var(--mono);font-size:11px;padding:3px 11px;border-radius:13px;cursor:pointer;
  border:1px solid var(--line); color:var(--fg-mute); transition:all .18s var(--ease-in);
}
.mode.active{background:var(--amber);color:var(--bg);border-color:var(--amber);font-weight:500}
#prompt-sign{color:var(--amber);font-family:var(--mono);font-size:16px}
#input{
  flex:1; background:transparent; border:none; outline:none; color:var(--fg);
  font-family:var(--sans); font-size:15px;
}
#input::placeholder{color:var(--fg-mute)}
#submit{
  font-family:var(--mono);font-size:11px;color:var(--fg-mute);cursor:pointer;
  border:1px solid var(--line);border-radius:5px;padding:4px 10px;transition:all .18s;
}
#submit:hover{color:var(--amber);border-color:var(--amber)}
#inputbar.busy{opacity:.5;pointer-events:none}

/* ── 重大事件仪式（视觉外壳，P1 接数据）── */
#spectacle{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:50}
#spectacle.show{display:flex}
#spectacle .scrim{position:absolute;inset:0;background:oklch(0.1 0.01 55 / .78);backdrop-filter:blur(10px);animation:scrimin .9s var(--ease-in)}
@keyframes scrimin{from{opacity:0;backdrop-filter:blur(0)}to{opacity:1}}
#spectacle .rule{height:1px;background:linear-gradient(90deg,transparent,var(--amber),transparent);width:920px;max-width:88vw;animation:ruleopen 1s var(--ease-in)}
@keyframes ruleopen{from{width:0;opacity:0}to{opacity:.7}}
#spectacle .sub-label{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--amber);text-transform:uppercase;margin:18px 0 10px}
#spectacle .title{font-family:var(--serif);font-weight:200;font-size:clamp(44px,7.2vw,104px);color:var(--fg);text-align:center;animation:develop 1.3s var(--ease-in)}
@keyframes develop{from{letter-spacing:.55em;filter:blur(10px);opacity:0}to{letter-spacing:.14em;filter:blur(0);opacity:1}}
#spectacle .desc{font-family:var(--sans);color:var(--fg-dim);margin-top:20px;animation:fadein 1s .9s both}
#spectacle .hint{font-family:var(--mono);font-size:11px;color:var(--fg-mute);margin-top:30px;animation:fadein 1s 1.4s both}

/* ════════ 三栏 game-client 布局（覆盖旧的竖排堆叠）════════ */
body{ display:block; align-items:stretch; height:100vh; overflow:hidden; }
#topbar{ width:100%; max-width:none; height:46px; box-sizing:border-box; }
#topbar .logo{color:var(--amber);font-size:15px}
#topbar .dim{color:var(--fg-mute)}
#topbar #tabs{display:flex}
#topbar #sessbtn{cursor:pointer;color:var(--fg-dim);border:1px solid var(--line);border-radius:5px;padding:3px 10px}
#topbar #sessbtn:hover{color:var(--fg);border-color:var(--fg-mute)}
#app{ display:grid; grid-template-columns:296px minmax(0,1fr) 326px; gap:14px;
  height:calc(100vh - 46px); padding:14px; box-sizing:border-box; max-width:1600px; margin:0 auto; }
.col{ min-height:0; display:flex; flex-direction:column; gap:14px; }
.col-l, .col-r{ overflow-y:auto; scrollbar-width:thin; }
.col-c{ overflow:hidden; }
.pcard{ background:var(--bg-soft); border:1px solid var(--line-soft); border-radius:14px; padding:14px 16px; }
.pcard-h{ font-family:var(--serif); font-size:15px; color:var(--fg); margin-bottom:13px; }

/* 左：角色状态 */
.status-body .st-vital{margin-bottom:11px}
.st-vital .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--fg-mute);text-transform:uppercase}
.st-vital .val{float:right;font-family:var(--mono);font-size:13px;color:var(--fg)}
.st-vital .vbar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin-top:6px;clear:both}
.st-vital .vbar i{display:block;height:100%;border-radius:3px;transition:width .35s var(--ease-in)}
.st-vital[data-sem=hp] .vbar i{background:var(--red)}
.st-vital[data-sem=sp] .vbar i{background:var(--cyan)}
.st-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.st-cell{background:var(--panel);border:1px solid var(--line-soft);border-radius:9px;padding:8px 9px}
.st-cell .lbl{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--fg-mute)}
.st-cell .val{font-family:var(--mono);font-size:15px;color:var(--fg-dim)}

/* 左：位置与出口（小罗盘 + 出口 chip）*/
#loc-body .loc-name{font-family:var(--serif);font-size:16px;color:var(--fg);margin-bottom:10px}
.compass{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;width:120px;margin:0 auto 10px}
.compass .cc{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border:1px solid var(--line-soft);
  border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--fg-mute);background:var(--panel)}
.compass .cc.on{color:var(--amber);border-color:var(--amber)}
.compass .cc.mid{color:var(--fg);border-color:var(--line);background:transparent}
.exit-chips{display:flex;flex-wrap:wrap;gap:6px}
.exit-chips .ec{font-family:var(--mono);font-size:11px;color:var(--fg-dim);background:var(--panel);
  border:1px solid var(--line-soft);border-radius:6px;padding:4px 9px;cursor:pointer}
.exit-chips .ec:hover{color:var(--amber);border-color:var(--amber)}
.exit-chips .ec.locked{color:var(--red);border-color:transparent;cursor:default;opacity:.7}

/* 左：会话工具 */
#sesstools{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#sesstools button,#quickintents button{font-family:var(--sans);font-size:12.5px;color:var(--fg-dim);
  background:var(--panel);border:1px solid var(--line-soft);border-radius:9px;padding:9px 8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s}
#sesstools button:hover,#quickintents button:hover{color:var(--amber);border-color:var(--amber)}
#sesstools .ic{opacity:.8}

/* 中栏 */
.col-c #stage-head{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:0 4px 10px;
  font-family:var(--serif);font-size:16px;color:var(--fg);border-bottom:1px solid var(--line-soft)}
.col-c #stage-head .live{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.col-c #stage-head #clearlog{font-family:var(--mono);font-size:11px;color:var(--fg-mute);cursor:pointer}
.col-c #stage-head #clearlog:hover{color:var(--fg-dim)}
.col-c #stage{flex:1 1 auto;min-height:0;overflow-y:auto;padding:14px 6px 6px;scroll-behavior:smooth}
#inputbar{flex:0 0 auto;width:100%;max-width:none;margin-top:10px;border:1px solid var(--line);border-radius:12px;
  background:var(--bg-soft);padding:10px 12px;display:flex;align-items:center;gap:10px}
#quickcmds{flex:0 0 auto;display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
#quickcmds .qc{font-family:var(--sans);font-size:12px;color:var(--fg-dim);background:var(--bg-soft);
  border:1px solid var(--line-soft);border-radius:7px;padding:5px 11px;cursor:pointer;transition:all .18s}
#quickcmds .qc:hover{color:var(--amber);border-color:var(--amber)}
#quickcmds .qc .qlabel{color:var(--fg-mute);margin-right:5px;font-family:var(--mono);font-size:10px}

/* 右：场景对象 */
#scene-filter{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
#scene-filter .sf{font-family:var(--mono);font-size:10.5px;color:var(--fg-mute);cursor:pointer;
  padding:3px 8px;border-radius:6px;border:1px solid transparent}
#scene-filter .sf.active{color:var(--amber);border-color:var(--amber)}
.so-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line-soft)}
.so-row:last-child{border-bottom:none}
.so-ic{width:26px;height:26px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  background:var(--panel);border:1px solid var(--line-soft);border-radius:7px;font-size:13px}
.so-nm{flex:1;min-width:0;font-size:13px;color:var(--fg)}
.so-nm .so-cat{display:block;font-family:var(--mono);font-size:9.5px;color:var(--fg-mute);font-style:normal;margin-top:1px}
.so-d{font-family:var(--mono);font-size:10.5px;color:var(--fg-mute);white-space:nowrap}
.so-row.enemy .so-ic{border-color:var(--amber);color:var(--amber)}
.so-row.enemy.hostile .so-ic{border-color:var(--red);color:var(--red)}
.so-more{font-family:var(--mono);font-size:11px;color:var(--fg-mute);text-align:center;padding-top:10px;cursor:pointer}
.so-more:hover{color:var(--fg-dim)}

/* 右：快捷意图 */
#quickintents{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* 右：环境状态 */
#env-body{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center}
#env-body .ev .lbl{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--fg-mute)}
#env-body .ev .val{font-family:var(--serif);font-size:15px;color:var(--fg-dim);margin-top:4px;display:block}
/* 棋盘格悬停提示 + 可点移动 */
.bcell[data-tip]{cursor:help}
.bcell[data-move]{cursor:pointer}
.bcell[data-move]:hover{box-shadow:0 0 0 2px var(--amber) inset}
.bcell[data-cell]{cursor:pointer}
.bcell[data-cell]:hover{box-shadow:0 0 0 2px var(--fg-mute) inset;background:var(--panel)}
#board-tip{position:fixed;z-index:60;pointer-events:none;display:none;background:var(--bg-soft);
  border:1px solid var(--line);border-radius:9px;padding:7px 11px;max-width:214px;
  box-shadow:0 10px 28px oklch(0.1 0.01 55 / .55)}
#board-tip b{display:block;font-family:var(--sans);font-size:12.5px;color:var(--fg);font-weight:600}
#board-tip span{display:block;font-family:var(--mono);font-size:10.5px;color:var(--fg-mute);margin-top:3px}
</style>
</head>

  <div id="topbar">

<script>
const $ = s => document.querySelector(s);
const esc2 = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const stage = $('#stage');
let mode = 'say', busy = false;

// ── 极简 markdown：仅 GM 叙事需要（代码块/加粗/em/行内码）──
function mdToHtml(t){
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const parts = t.split(/```/);
  let out = '';
  parts.forEach((seg,i)=>{
    if(i%2===1){ out += '<pre>'+esc(seg.replace(/^\n/,'').replace(/\n$/,''))+'</pre>'; return; }
    let h = esc(seg)
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`([^`]+?)`/g,'<code>$1</code>')
      .replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');
    out += '<p>'+h+'</p>';
  });
  return out;
}

function addPlayer(text){
  const d = document.createElement('div'); d.className='msg player'; d.textContent=text;
  stage.appendChild(d); scrollEnd();
}
function newGM(){
  const d = document.createElement('div'); d.className='msg gm cursor'; d.dataset.raw='';
  stage.appendChild(d); scrollEnd(); return d;
}
function scrollEnd(){ stage.scrollTop = stage.scrollHeight; }

// ── 状态条（去-CoC：动态属性）──
async function refreshHud(){
  try{ const s = await (await fetch('/state')).json(); renderHud(s); }catch(e){}
}

// ── 一个回合：POST /turn，消费 SSE ──
async function sendTurn(text){
  if(busy) return; busy=true; $('#inputbar').classList.add('busy');
  if(text) addPlayer(text);
  const think = document.createElement('div'); think.className='thinking'; think.textContent='⋯ GM 正在推演';
  stage.appendChild(think); scrollEnd();
  let gm=null;
  // 引擎渲染面板（本回合内：场景/战斗/敌在场各保一张就地更新，骰子逐条累积）
  let curScene=null, curCombat=null, curEnemies=null;
  const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const mkCard=(type,html)=>{const c=document.createElement('div');c.className='msg card '+type;c.innerHTML=html;
    if(think.parentNode) stage.insertBefore(c,think); else stage.appendChild(c); scrollEnd(); return c;};
  // GM 每调一个工具 → 留一条持久痕迹行（让玩家看见 GM 在做什么）
  const addTrace=(name, argsJson)=>{
    const parts=[];
    try{ for(const v of Object.values(JSON.parse(argsJson||'{}'))){
      if(v===''||v==null||v===false) continue;
      if(Array.isArray(v)){ if(v.length) parts.push(v.join('/')); }
      else if(typeof v==='object'){ parts.push(JSON.stringify(v)); }
      else parts.push(String(v));
    } }catch(e){}
    const arg = parts.join(' · ');
    const d=document.createElement('div'); d.className='msg trace';
    d.innerHTML='<span class="tn">🔧 '+esc(name)+'</span>'+(arg?'<span class="ta"> · '+esc(arg)+'</span>':'');
    if(think.parentNode) stage.insertBefore(d,think); else stage.appendChild(d); scrollEnd();
  };
  const renderCard=(type,d)=>{
    if(type==='scene'){
      const objs=(d.objects||[]).join('、')||'—', exits=(d.exits||[]).join(' · ')||'—';
      const amb=(d.ambient||[]).join('、');
      const html=`<div class="card-h">🔍 可查看</div><div class="card-b">${esc(objs)}</div>`+
                 (amb?`<div class="card-h">🧺 就地可用</div><div class="card-b">${esc(amb)}</div>`:'')+
                 `<div class="card-h">🚪 出口</div><div class="card-b">${esc(exits)}</div>`;
      if(curScene) curScene.innerHTML=html; else curScene=mkCard('scene',html);
    }else if(type==='dice'){
      const c=mkCard('dice','<div class="card-b dice-line">'+esc(d.line)+'</div>');
      if(d.outcome) c.classList.add('out-'+d.outcome);
    }else if(type==='combat'){
      const rows=(d.combatants||[]).map(cb=>{
        const r=cb.max_hp?Math.max(0,Math.min(1,cb.hp/cb.max_hp)):0;
        const cls='cb '+(cb.side==='enemy'?'enemy':'ally')+(cb.is_dead?' dead':'')+(cb.id===d.active?' active':'');
        return `<div class="${cls}"><span class="nm">${esc(cb.name)}</span>`+
               `<span class="bar"><i style="width:${Math.round(r*100)}%"></i></span>`+
               `<span class="hp">${cb.hp}/${cb.max_hp}</span></div>`;
      }).join('');
      const html=`<div class="ttl">⚔️ 第 ${d.round||1} 回合</div>`+rows;
      if(curCombat) curCombat.innerHTML=html; else curCombat=mkCard('combat',html);
    }else if(type==='combat_log'){
      const body=(d.lines||[]).map(l=>esc(l)).join('<br>');
      if(body) mkCard('log','<div class="card-b log-body">'+body+'</div>');
    }else if(type==='enemies'){
      // 未开战的在场敌人（刷怪/进场撞上）：一张"敌在场"卡，提示玩家有威胁
      const rows=(d.list||[]).map(e=>{
        const dmg=e.damage?(' · '+esc(e.damage)):'';
        return `<div class="cb enemy"><span class="nm">${esc(e.name)}</span>`+
               `<span class="bar"><i style="width:100%"></i></span>`+
               `<span class="hp">${e.hp}/${e.max_hp}${dmg}</span></div>`;
      }).join('');
      const html=`<div class="ttl">⚠️ 敌在场</div>`+rows;
      if(curEnemies) curEnemies.innerHTML=html; else curEnemies=mkCard('enemies',html);
    }
  };
  try{
    const resp = await fetch('/turn',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({input:text, mode})});
    const reader = resp.body.getReader(); const dec=new TextDecoder(); let buff='';
    while(true){
      const {value,done}=await reader.read(); if(done) break;
      buff += dec.decode(value,{stream:true});
      let idx;
      while((idx=buff.indexOf('\n\n'))>=0){
        const chunk=buff.slice(0,idx); buff=buff.slice(idx+2);
        const ev=(chunk.match(/^event: (.+)$/m)||[])[1];
        const dm=(chunk.match(/^data: (.+)$/m)||[]); if(!dm[1]) continue;
        const data=JSON.parse(dm[1]);
        if(ev==='delta'){
          if(think.parentNode) think.remove();
          if(!gm) gm=newGM();
          gm.dataset.raw += data.text;
          gm.innerHTML = mdToHtml(gm.dataset.raw); gm.classList.add('cursor');
          scrollEnd();
        }else if(ev==='tool'){
          addTrace(data.name, data.args);          // 持久留痕
          think.textContent='⋯ GM 正在推演';
        }else if(ev==='render'){
          renderCard(data.type, data.data);
        }else if(ev==='reset'){
          // 中间轮的"抢跑叙事"——清掉，等最后一轮重新流（玩家只该看到结算后的叙事）
          if(gm){ gm.remove(); gm=null; }
        }else if(ev==='final'){
          if(gm){ gm.classList.remove('cursor'); gm.innerHTML=mdToHtml(gm.dataset.raw||data.text); }
        }else if(ev==='hud'){
          renderHud(data); loadPanels();      // 回合末刷新侧栏面板数据
        }else if(ev==='error'){
          if(think.parentNode) think.remove();
          addSystem('✗ '+data.message,'fail');
        }
      }
    }
  }catch(e){ addSystem('✗ 连接出错：'+e,'fail'); }
  finally{ if(think.parentNode) think.remove(); busy=false; $('#inputbar').classList.remove('busy'); $('#input').focus(); }
}
function addSystem(text,cls){
  const d=document.createElement('div'); d.className='msg system '+(cls||'');
  d.innerHTML='<span class="pip"></span><span>'+text+'</span>'; stage.appendChild(d); scrollEnd();
}
function renderHud(s){
  if(!s||!s.started) return;
  const w=$('#topbar-world'); if(w) w.textContent=s.world||'';
  renderStatus(s);
}
// ── 左栏：角色状态 ──
function renderStatus(s){
  const b=$('#status-body'); if(!b||!s||!s.vitals) return;
  const v=s.vitals;
  const bar=(sem,lbl,val,r)=>`<div class="st-vital" data-sem="${sem}"><span class="lbl">${lbl}</span>`+
    `<span class="val">${val}</span><div class="vbar"><i style="width:${Math.round(Math.max(0,Math.min(1,r))*100)}%"></i></div></div>`;
  const cell=(sem,lbl,val)=>`<div class="st-cell" data-sem="${sem}"><span class="lbl">${esc2(lbl)}</span><span class="val">${esc2(String(val))}</span></div>`;
  let h=bar('hp','HP',v.hp+' / '+v.max_hp, v.max_hp?v.hp/v.max_hp:0);
  if(v.max_stamina>0) h+=bar('sp','SP',v.stamina+' / '+v.max_stamina, v.stamina/v.max_stamina);
  let cells=cell('lv','LV','Lv.'+v.level);
  (s.attributes||[]).forEach(a=>cells+=cell(a.key,a.label,a.value));
  cells+=cell('gold','金币',v.gold);
  b.innerHTML=h+`<div class="st-grid">${cells}</div>`;
}
// ── 左栏：场地·位置（有棋盘画棋盘，否则退回出口 chip）──
const DIR_CN={north:'北',south:'南',east:'东',west:'西',up:'上',down:'下','in':'进','out':'出'};
function renderLocation(P){
  const b=$('#loc-body'); if(!b) return;
  const sc=P&&P.scene; if(!sc){ b.innerHTML='<div class="pempty">—</div>'; return; }
  const exits=sc.exits||[];
  const chips=exits.map(e=>`<span class="ec${e.locked?' locked':''}" ${e.locked?'':`data-go="${e.dir}"`}>`+
    `${DIR_CN[e.dir]||e.dir}${e.locked?' 🔒':''}</span>`).join('') || '<span class="ec locked">无出口</span>';
  if(P.board){
    // 这间房有二维棋盘 → 直接画一张紧凑棋盘 + 一行出口 chip（可点走位）
    b.innerHTML=renderBoard(P.board, 256, true)+`<div class="exit-chips" style="margin-top:10px">${chips}</div>`;
  }else{
    // 无棋盘房：保留位置名 + 出口 chip
    b.innerHTML=`<div class="loc-name">${esc2(sc.room||'')}</div><div class="exit-chips">${chips}</div>`;
  }
}
// ── 右栏：场景对象（筛选 + 距离）──
const SO_ICON={container:'📦',npc:'🧍',scenery:'🗿',document:'📜',item:'🎒','陈设':'🪵','生物':'☠'};
let sceneFilter='全部';
function renderSceneObjects(P){
  const fb=$('#scene-filter'), b=$('#scene-body'); if(!b) return;
  const objs=(P&&P.scene&&P.scene.objects)||[];
  ['全部','可交互','生物','地形','其他'].forEach;
  fb.innerHTML=['全部','可交互','生物','地形','其他'].map(c=>`<span class="sf${c===sceneFilter?' active':''}" data-cat="${c}">${c}</span>`).join('');
  const list=objs.filter(o=>sceneFilter==='全部'||o.cat===sceneFilter);
  if(!list.length){ b.innerHTML='<div class="pempty">这一带没什么东西</div>'; return; }
  const shown=list.slice(0,8);
  b.innerHTML=shown.map(o=>{
    const icon=SO_ICON[o.kind]||SO_ICON[o.cat]||'·';
    const ecls=o.cat==='生物'?(' enemy'+(o.state==='hostile'?' hostile':'')):'';
    return `<div class="so-row${ecls}" data-name="${esc2(o.name)}"><span class="so-ic">${icon}</span>`+
      `<span class="so-nm">${esc2(o.name)}<i class="so-cat">${esc2(o.cat)}</i></span>`+
      `<span class="so-d">${esc2(o.dist||'')}</span></div>`;
  }).join('')+(list.length>shown.length?`<div class="so-more">共 ${list.length} 项</div>`:'');
}
// ── 右栏：环境状态 ──
function renderEnvironment(P){
  const b=$('#env-body'); if(!b) return;
  const e=(P&&P.environment)||{};

function renderDrawer(tab){
  const P = window.PANELS, body = $('#dbody');

function renderInventory(inv){
  if(!inv || !inv.length) return '<div class="pempty">空空如也——背包里什么都没有</div>';
  return inv.map(it=>{
    const ttl = (it.ttl>0)?`<span class="ptag">${it.ttl} 回合</span>`:'';
    const caps = (it.capabilities||[]).map(c=>esc2(c)).join('<br>');
    return `<div class="pitem"><div class="pname">${esc2(it.name)}${ttl}</div>`+
           (caps?`<div class="pcap">${caps}</div>`:'')+`</div>`;
  }).join('');
}
function renderSkills(skills){
  if(!skills || !skills.length) return '<div class="pempty">还没学会任何技能</div>';
  let out='';
  ['passive','active','reactive'].forEach(k=>{
    const grp = skills.filter(s=>s.kind===k);
    if(!grp.length) return;
    out += `<div class="psection">${SKILL_KIND[k]}</div>`;
    out += grp.map(s=>{
      const rank = `<span class="ptag">Rank ${s.rank}</span>`;
      let meta='';
      if(s.kind==='active'){
        const cost = Object.entries(s.cost||{}).map(([k,v])=>`${k} ${v}`).join(' / ');
        const cd = s.cooldown? ` · CD ${s.remaining_cooldown||0}/${s.cooldown}`:'';
        meta = `<div class="pcap">消耗 ${esc2(cost)||'—'}${cd}</div>`;
      }
      return `<div class="pitem"><div class="pname">${esc2(s.name)}${rank}</div>`+
             (s.desc?`<div class="pdesc">${esc2(s.desc)}</div>`:'')+meta+`</div>`;
    }).join('');
  });
  return out;
}
function renderQuest(quests){
  if(!quests || !quests.length) return '<div class="pempty">暂无任务</div>';
  return quests.map(q=>{
    const facts = (q.known_facts||[]).map(f=>`<div class="fact">${esc2(f)}</div>`).join('');
    const un = (q.unresolved||[]).map(f=>`<div class="fact un">${esc2(f)}</div>`).join('');
    return `<div class="pitem"><div class="pname">${esc2(q.title)}<span class="ptag">${esc2(q.stage)}</span></div>`+
           (q.summary?`<div class="pdesc">${esc2(q.summary)}</div>`:'')+
           (facts?`<div class="psection">已知线索</div>${facts}`:'')+
           (un?`<div class="psection">未解之谜</div>${un}`:'')+`</div>`;
  }).join('');
}
function renderMap(map){
  const wrap = $('#mapwrap'); if(!wrap) return;
  const rooms = (map && map.rooms)||[];
  if(!rooms.length){ wrap.innerHTML='<div class="pempty">无地图</div>'; return; }
  const xs=rooms.map(r=>r.x), ys=rooms.map(r=>r.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const cell=72, padX=40, padY=34;
  const W=(maxX-minX)*cell+padX*2, H=(maxY-minY)*cell+padY*2;
  wrap.style.width=W+'px'; wrap.style.height=H+'px';
  const px=r=>padX+(r.x-minX)*cell, py=r=>padY+(maxY-r.y)*cell;   // 北(大 y)朝上
  const byId={}; rooms.forEach(r=>byId[r.id]=r);
  let lines=''; const seen=new Set();
  rooms.forEach(r=>Object.entries(r.exits||{}).forEach(([dir,tid])=>{
    const t=byId[tid]; if(!t) return;
    const key=[r.id,tid].sort().join('|'); if(seen.has(key)) return; seen.add(key);
    const locked=(r.locked||[]).includes(dir);
    lines += `<line x1="${px(r)}" y1="${py(r)}" x2="${px(t)}" y2="${py(t)}" `+
             `style="stroke:${locked?'var(--red)':'var(--fg-mute)'};stroke-width:1.5"`+
             (locked?' stroke-dasharray="4 4"':'')+`/>`;
  }));
  const nodes = rooms.map(r=>{
    const cls='mroom'+(r.current?' current':'')+(r.visited?'':' unvisited')+(r.safe?' safe':'');
    const you=r.current?'<span class="you">◆</span>':'';
    return `<div class="${cls}" style="left:${px(r)}px;top:${py(r)}px">${esc2(r.name)}${you}</div>`;
  }).join('');
  wrap.innerHTML = `<svg width="${W}" height="${H}">${lines}</svg>${nodes}`;
}
const BOARD_GLYPH = {object:'◈', ambient:'·', landmark:'◇', exit:'⛬', poi:'?', enemy:'☠'};
const KIND_TIP = {object:'物件/人', ambient:'陈设', landmark:'落脚点', exit:'出口', poi:'未探明', enemy:'敌'};
const BEAR8 = ['东','东北','北','西北','西','西南','南','东南'];
function cellBearing(px,py,tx,ty){ const dx=tx-px,dy=ty-py; if(!dx&&!dy)return'';
  const a=Math.atan2(-dy,dx)*180/Math.PI; return BEAR8[Math.round((((a%360)+360)%360)/45)%8]; }
function cellDist(px,py,tx,ty){ const d=Math.max(Math.abs(tx-px),Math.abs(ty-py));
  return d<=1?'手边':(d<=3?d+' 步':d+' 步·远'); }
function renderBoard(b, avail=320, compact=false){
  if(!b) return '<div class="pempty">这间房没有棋盘布局——满屋皆在手边，随手可取。</div>';
  const at = {};                                   // "x,y" → token
  (b.tokens||[]).forEach(t=>{ at[t.x+','+t.y]=t; });
  const blocked = new Set((b.blocked||[]).map(c=>c[0]+','+c[1]));
  const px=b.player.x, py=b.player.y;
  // 单元尺寸：扣掉格间距后按可用宽自适应（侧栏窄、抽屉宽）
  const cs = Math.max(compact?26:46, Math.min(compact?52:64,
             Math.floor((avail-(b.width-1)*4)/b.width)));
  let cells='';
  for(let y=0; y<b.height; y++){
    for(let x=0; x<b.width; x++){
      const key=x+','+y, t=at[key], here=(x===px&&y===py);
      const cls=['bcell']; if(t) cls.push('b-'+t.kind); if(t&&t.kind==='enemy') cls.push('b-enemy-'+(t.state||'idle')); if(blocked.has(key)) cls.push('blocked');
      if(here) cls.push('here');
      const g = t ? `<span class="bg">${BOARD_GLYPH[t.kind]||'·'}</span>` : '';
      const nm = (t && (!compact || cs>=40)) ? `<span class="bn">${esc2(t.name)}</span>` : '';
      const you = here ? '<span class="byou">你</span>' : '';
      const emptyWalkable = !t && !here && !blocked.has(key);   // 可走过去的空格
      // 悬停提示：名字 + 类别 + 距离·方位（空地也给提示）
      let tip='';
      if(t || here || emptyWalkable){
        let nmText, sub;
        if(here){ nmText='你'; sub = t ? ('你在此 · '+(KIND_TIP[t.kind]||'')) : '当前位置'; }
        else{
          const bear=cellBearing(px,py,x,y), dist=cellDist(px,py,x,y);
          if(t){ nmText=t.name;
            const label = t.kind==='enemy' ? ('敌 · '+(t.state==='hostile'?'已锁定':'未察觉'))
                                            : (KIND_TIP[t.kind]||'');
            sub = (label?label+' · ':'') + dist + (bear?' · '+bear:''); }
          else{ nmText='空地'; sub='走到这里 · '+dist+(bear?' · '+bear:''); }
        }
        tip = ` data-tip="${esc2(nmText)}|${esc2(sub)}"`;
      }
      // 点击：有名实体→命令 GM 走过去（无坐标 NL）；空地→坐标直走(/move_cell，不经 GM)
      let act='';
      if(t && !here){
        const cmd = t.kind==='exit' ? `向${DIR_CN[t.dir]||t.dir}走`
                  : t.kind==='enemy' ? `走向${t.name}`
                  : `走到${t.name}`;
        act = ` data-move="${esc2(cmd)}"`;
      }else if(emptyWalkable){
        act = ` data-cell="${x},${y}"`;
      }
      cells += `<div class="${cls.join(' ')}"${tip}${act} style="width:${cs}px;height:${cs}px">${g}${nm}${you}</div>`;
    }
  }
  const hint = compact ? `${esc2(b.room)} · 北↑`
                       : `${esc2(b.room)} · 北↑ · 「你」为当前位置，说"走到XX"即可移动`;
  const legend = compact ? '' :
    `<div class="blegend">◈ 物件/人 · ☠ 敌(黄=未察觉/红=已锁定) · ? 未探明 · ⛬ 出口 · ◇ 落脚点 · ▓ 障碍</div>`;
  return `<div class="bhint">${hint}</div>`+
         `<div class="board" style="grid-template-columns:repeat(${b.width},${cs}px)">${cells}</div>`+legend;
}

async function bootstrap(){
